[colors]
background = #00000000
background-alt = #1A2E1A
foreground = #A8D8A8
primary = #00FF41
secondary = #39D353
alert = #FF3333
disabled = #4A7050

[bar/bar]
width = 100%
height = 15pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; font-0: text, font-1: Nerd Font icons
font-0 = monospace:size=8;2
font-1 = JetBrainsMono Nerd Font:size=10;3

modules-left = xworkspaces xwindow
modules-center = hostname
modules-right = pulseaudio xkeyboard wifi battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/hostname]
type = custom/script
exec = echo "bachmaninoff"
interval = 0
label = %output%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĖĀ muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/wifi]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = %{T2}ůį§®%{T-} %essid%
label-connected-foreground = ${colors.primary}

label-disconnected = %{T2}ůį§≠%{T-}
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 98
low-at = 15

; Nerd Font battery icons
format-charging = %{T2}<animation-charging>%{T-} <label-charging>
format-discharging = %{T2}<ramp-capacity>%{T-} <label-discharging>
format-full = %{T2}ůįĀĻ%{T-} <label-full>
format-low = %{T2}ůįĀļ%{T-} <label-low>

label-charging = %percentage%%
label-charging-foreground = ${colors.secondary}

label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

label-full = FULL
label-full-foreground = ${colors.primary}

label-low = %percentage%%
label-low-foreground = ${colors.alert}

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀĹ
ramp-capacity-3 = ůįĀĺ
ramp-capacity-4 = ůįĀŅ
ramp-capacity-5 = ůįāÄ
ramp-capacity-6 = ůįāĀ
ramp-capacity-7 = ůįāā
ramp-capacity-8 = ůįāā
ramp-capacity-9 = ůįĀĻ

animation-charging-0 = ůįĀĽ
animation-charging-1 = ůįĀĹ
animation-charging-2 = ůįĀŅ
animation-charging-3 = ůįāĀ
animation-charging-4 = ůįāÉ
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
